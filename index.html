<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#13746d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Chord Trainer" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Chord Strumming Trainer</title>
    <link rel="icon" type="image/svg+xml" href="./assets/app-icon.svg?v=1.038" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png?v=1.038" />
    <link rel="manifest" href="./manifest.webmanifest?v=1.038" />
    <link rel="stylesheet" href="./styles.css?v=1.038" />
  </head>
  <body>
    <main class="app-shell" id="appShell">
      <section class="metronome-panel" aria-label="Strumming metronome">
        <header class="topbar">
          <div>
            <p class="eyebrow">
              Chord Strumming Trainer
              <a class="version-inline" href="https://github.com/techtony2018/Chord-Strumming-Trainer#readme" target="_blank" rel="noreferrer">v1.038</a>
            </p>
          </div>
        </header>

        <section class="tempo-strip" aria-label="Tempo controls">
          <input id="tempoSlider" class="tempo-slider-inline" type="range" min="40" max="180" value="126" />
          <button class="step-button" id="tempoDown" type="button" aria-label="Decrease tempo">-</button>
          <div class="tempo-readout">
            <output id="tempoValue" for="tempoSlider" role="button" tabindex="0" title="Click to step tempo by 20 BPM. Double-click to reset to 126 BPM." aria-label="Tempo 126 BPM. Click to step by 20 BPM. Double-click to reset to 126 BPM.">126</output>
            <span>BPM</span>
          </div>
          <button class="step-button" id="tempoUp" type="button" aria-label="Increase tempo">+</button>
          <button class="icon-button tuner-launch-button" id="tunerToggleButton" type="button" title="Open guitar tuner" aria-label="Open guitar tuner" aria-expanded="false" aria-controls="tunerPanel">
            <span class="tuning-fork-icon" id="tunerToggleIcon" aria-hidden="true"></span>
          </button>
        </section>

        <section class="tuner-panel" id="tunerPanel" aria-label="Guitar tuner" hidden>
          <div class="label-actions">
            <label for="tuningPreset">Guitar tuner</label>
            <button class="tuner-power-button icon-reset-button" id="retuneButton" type="button" aria-label="Retune" title="Retune">
              <svg class="reset-cycle-icon" viewBox="0 0 48 48" aria-hidden="true">
                <path d="M8 18a17 17 0 0 1 29-5l4 5" />
                <path d="M41 9v9h-9" />
                <path d="M40 30a17 17 0 0 1-29 5l-4-5" />
                <path d="M7 39v-9h9" />
              </svg>
            </button>
          </div>
          <div class="tuner-options">
            <select id="tuningPreset" aria-label="Tuning preset">
              <option value="standard" selected>Standard - E A D G B E</option>
              <option value="drop-d">Drop D - D A D G B E</option>
              <option value="open-g">Open G - D G D G B D</option>
              <option value="half-step">Half step down - Eb Ab Db Gb Bb Eb</option>
            </select>
          </div>
          <div class="tuner-reading">
            <strong class="tuner-note" id="tunerDetectedNote">--</strong>
            <div class="tuner-target">
              <div class="tuner-target-heading">
                <span id="tunerTargetLabel">Target E2</span>
                <label class="mini-toggle tuner-auto-toggle">
                  <input id="tunerAutoToggle" type="checkbox" checked />
                  <span>Auto</span>
                </label>
              </div>
            </div>
          </div>
          <div class="tuner-meter" aria-hidden="true">
            <span class="tuner-meter-track"></span>
            <span class="tuner-needle" id="tunerNeedle"></span>
          </div>
          <div class="tuner-meter-labels" aria-hidden="true">
            <span>Flat</span>
            <span>In tune</span>
            <span>Sharp</span>
          </div>
          <div class="tuner-input" aria-label="Microphone input level">
            <div class="tuner-input-label">
              <span>Input</span>
              <output id="tunerInputLevel" aria-live="polite">Off</output>
            </div>
            <span class="tuner-input-track" aria-hidden="true">
              <span class="tuner-input-fill" id="tunerInputFill"></span>
            </span>
          </div>
          <div class="tuner-strings" id="tunerStrings" aria-label="Target guitar strings"></div>
          <output class="tuner-status-output" id="tunerCents" aria-live="polite">Microphone off</output>
        </section>

        <div class="trainer-view" id="trainerView">
        <section class="beat-display" aria-label="Beat display">
          <div class="count-readout">
            <div class="pulse-ring idle" id="pulseRing" role="button" tabindex="0" aria-label="Start">
              <span id="beatNumber" class="transport-icon"></span>
            </div>
            <div class="now-playing">
              <span id="strokeName">Ready</span>
              <span id="slotLabel">Pattern starts on beat 1</span>
            </div>
          </div>
          <div class="active-chords-row">
            <div class="active-chord-card" id="activeChordCard" aria-label="Current chord">
              <strong id="annotationLabel">Intro</strong>
              <div class="measure-number" id="activeMeasure">Measure 1</div>
              <div class="chord-name-row">
                <div class="chord-name" id="activeChordName">C</div>
                <div class="voicing-chip" id="activeVoicing">1/1</div>
              </div>
              <div id="activeChordDiagram"></div>
            </div>
            <div class="next-chord-card" id="nextChordCard" aria-label="Next chord">
              <div class="measure-number" id="nextMeasure">Next</div>
              <div class="chord-name-row">
                <div class="chord-name" id="nextChordName">G</div>
                <div class="voicing-chip" id="nextVoicing">1/1</div>
              </div>
              <div id="nextChordDiagram"></div>
            </div>
          </div>
        </section>

        <section class="pattern-grid" id="patternGrid" aria-label="Strumming pattern"></section>
        <section class="accent-lane" aria-label="Accent pattern">
          <div class="accent-grid" id="accentGrid"></div>
        </section>

        <section class="chord-strip" aria-label="Chord sequence">
          <div class="section-label">Chords <span aria-hidden="true">-</span> <strong id="pieceName">Unnamed Pice</strong></div>
          <div class="chord-grid" id="chordGrid"></div>
          <button class="chord-expand-button" id="expandChordsButton" type="button" aria-expanded="false" aria-controls="fullChordPanel">
            <span aria-hidden="true">↓</span>
          </button>
          <div class="full-chord-panel" id="fullChordPanel" hidden>
            <div class="full-chord-grid" id="fullChordGrid"></div>
          </div>
        </section>

        <section class="transport" aria-label="Transport controls">
          <button class="primary-button ready" id="playButton" type="button">Start</button>
          <button class="secondary-button icon-reset-button" id="resetButton" type="button" aria-label="Reset" title="Reset">
            <svg class="reset-cycle-icon" viewBox="0 0 48 48" aria-hidden="true">
              <path d="M8 18a17 17 0 0 1 29-5l4 5" />
              <path d="M41 9v9h-9" />
              <path d="M40 30a17 17 0 0 1-29 5l-4-5" />
              <path d="M7 39v-9h9" />
            </svg>
          </button>
        </section>
        </div>

      </section>

      <aside class="control-panel" id="controlPanel" aria-label="Metronome settings">
        <section class="control-group">
          <label for="patternSelect">Pattern</label>
          <select id="patternSelect"></select>
        </section>

        <section class="control-row">
          <div class="control-group">
            <label for="beatsSelect">Beats</label>
            <select id="beatsSelect">
              <option value="2">2/4</option>
              <option value="3">3/4</option>
              <option value="4" selected>4/4</option>
              <option value="5">5/4</option>
              <option value="6">6/4</option>
            </select>
          </div>
          <div class="control-group">
            <label for="subdivisionSelect">Grid</label>
            <select id="subdivisionSelect">
              <option value="1">Quarter</option>
              <option value="2" selected>Eighth</option>
              <option value="3">Triplet</option>
              <option value="4">Sixteenth</option>
            </select>
          </div>
        </section>

        <section class="control-group">
          <label for="customPattern">Custom pattern</label>
          <textarea id="customPattern" rows="1" wrap="off" spellcheck="false" aria-describedby="customHint"></textarea>
          <p id="customHint" class="hint">Use D, U, X, R. Spaces and bars are okay.</p>
        </section>

        <section class="control-group">
          <div class="label-actions">
            <label for="chordSequence">Chord sequence</label>
            <div class="sequence-actions">
              <button id="loadSequenceButton" type="button">Load</button>
              <button id="saveSequenceButton" type="button">Save</button>
            </div>
          </div>
          <textarea id="chordSequence" rows="7" spellcheck="false" aria-describedby="chordHint">Piece:Beautiful-One-Simplified Anno:Intro F G F G F G C C Anno:Verse1 F G C F G Am F G C F G C Anno:Chorus F G F G F G C Anno:Verse2 F G C F G Am F G C Anno:Chorus F G F G F G C Anno:Chorus F G F G F G C Anno:Bridge1 F G F G F G Anno:Chorus F G F G F G C Anno:Bridge2 F G F G F G Anno:Bridge2 F G F G F G Anno:Bridge2-Quiet1 F G F G F G Anno:Bridge2-Quiet2 F G F G F G</textarea>
          <input id="sequenceFileInput" type="file" accept=".txt,text/plain,.chords" hidden />
          <a id="sequenceDownloadLink" class="download-link" href="#" download hidden>Download sequence file</a>
          <p id="saveStatus" class="hint" aria-live="polite"></p>
          <p id="chordHint" class="hint">Separate measures with spaces, commas, or bars.</p>
        </section>

        <section class="control-group">
          <div class="volume-heading">
            <label for="volumeSlider">Beat volume</label>
            <label class="mini-toggle">
              <input id="beatMuteToggle" type="checkbox" />
              <span>Mute</span>
            </label>
          </div>
          <input id="volumeSlider" type="range" min="0" max="100" value="34" />
        </section>

        <section class="control-group">
          <div class="volume-heading">
            <label for="chordVolumeSlider">Chord volume</label>
            <label class="mini-toggle">
              <input id="chordMuteToggle" type="checkbox" />
              <span>Mute</span>
            </label>
          </div>
          <input id="chordVolumeSlider" type="range" min="0" max="100" value="58" />
        </section>

        <section class="control-row">
          <label class="toggle">
            <input id="accentToggle" type="checkbox" checked />
            <span>Beat accent</span>
          </label>
          <label class="toggle">
            <input id="countToggle" type="checkbox" checked />
            <span>Count in</span>
          </label>
        </section>

        <section class="control-group">
          <label for="practiceMode">Practice mode</label>
          <select id="practiceMode">
            <option value="normal">Normal</option>
            <option value="silent-4">Drop every 4th bar</option>
            <option value="silent-8">Drop every 8th bar</option>
          </select>
        </section>

      </aside>
    </main>

    <script src="./app.js?v=1.038"></script>
  </body>
</html>
